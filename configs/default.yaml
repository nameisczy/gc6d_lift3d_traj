paths:
  gc6d_root: /mnt/ssd/ziyaochen/GraspClutter6D
  lift3d_root: /home/ziyaochen/LIFT3D
  gc6d_api_root: /home/ziyaochen/graspclutter6dAPI
  output_root: /mnt/ssd/ziyaochen/gc6d_lift3d_traj_data

dataset:
  split: train
  camera: realsense-d415
  top_k: 50
  index_filename: index_train.jsonl
  resumable: true
  # null = iterate full split (use --max-samples for debug)
  max_samples: null
  filtering:
    collision_free_only: true
    force_closure_only: true
    friction_valid_only: true
    min_score: null
  filtering:
    collision_free_only: true
    force_closure_only: true
    friction_valid_only: true

trajectory:
  start_height_offset: 0.15
  pregrasp_offset: 0.08
  lift_distance: 0.05
  T: 24
  phase_steps: [8, 8, 2, 6]
  gripper_open: 1.0
  gripper_closed: 0.0
  # cuRobo motion generation (requires CUDA + pip install -e https://github.com/NVlabs/curobo)
  use_curobo: true
  curobo_robot: franka.yml
  curobo_scene: collision_table.yml
  curobo_verbose: true

collision:
  table_z: 0.0
  table_tolerance: 0.01
  point_contact_threshold: 0.005
  # scene point cloud is dense; allow more in-box points before rejecting (v1 heuristic)
  max_points_in_boxes: 800

training:
  batch_size: 16
  lr: 1e-4
  num_epochs: 20
  imitation_weight: 1.0
  goal_weight: 1.0
  gripper_weight: 0.2
